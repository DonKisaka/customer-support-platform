spring.application.name=billing-agent
server.port=8081
server.servlet.context-path=/a2a

# Anthropic
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.model=claude-haiku-4-5-20251001

# A2A Agent Card
a2a.agent.name=Billing Agent
a2a.agent.description=Handles billing, invoice, and payment related customer queries
a2a.agent.version=1.2.3

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/billing_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
