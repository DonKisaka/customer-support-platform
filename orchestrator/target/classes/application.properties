spring.application.name=orchestrator
server.port=8080
server.servlet.context-path=/a2a

# Anthropic
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.model=claude-haiku-4-5-20251001

# A2A Agent Card
a2a.agent.name=Customer Support Orchestrator
a2a.agent.description=Routes customer queries to specialist agents (billing, tech support, escalation)
a2a.agent.version=1.2.3

# Sub-agent URLs
agents.billing.url=http://localhost:8081/a2a
agents.tech-support.url=http://localhost:8082/a2a
agents.escalation.url=http://localhost:8083/a2a
