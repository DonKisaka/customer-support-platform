spring.application.name=tech-support-agent
server.port=8082
server.servlet.context-path=/a2a

# Anthropic
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.model=claude-haiku-4-5-20251001

# A2A Agent Card
a2a.agent.name=Tech Support Agent
a2a.agent.description=Answers technical product questions using RAG over product documentation
a2a.agent.version=1.2.3

# pgvector (RAG)
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.datasource.url=jdbc:postgresql://localhost:5432/techsupport_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
